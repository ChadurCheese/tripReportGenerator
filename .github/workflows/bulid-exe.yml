name: Build Windows App EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build with Maven
        run: mvn clean package

      - name: Verify JAR exists
        run: |
          dir target

      - name: Show target folder
        run: dir target

      - name: Run jpackage
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name TripReportGenerator `
            --app-version "1.0.${{ github.run_number }}" `
            --input target `
            --main-jar trip-report-generator.jar `
            --main-class com.tripreport.app.Main `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --win-upgrade-uuid 8f5b6c1a-2e3d-4a7f-9c8b-1d6e0f4a2b3c

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReportGenerator-EXE
          path: "**/*.exe"